<svg width="1720" height="760" viewBox="0 0 1720 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Chess Ultimate Major Update Roadmap</title>
  <desc id="desc">A colorful roadmap showing completed version one work, a Terraria roguelike update, a bugfix and graphics polish pass, and a Kerbal Space Program inspired update.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.36" stop-color="#180609"/>
      <stop offset="0.7" stop-color="#111407"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="battleGlow" cx="18%" cy="22%" r="45%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="jokerGlow" cx="50%" cy="35%" r="46%">
      <stop offset="0" stop-color="#f5c842" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#f5c842" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wildGlow" cx="82%" cy="68%" r="44%">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="glowBlue" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#38bdf8" flood-opacity="0.65"/>
    </filter>
    <filter id="glowGold" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#f5c842" flood-opacity="0.65"/>
    </filter>
    <filter id="glowGreen" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#22c55e" flood-opacity="0.62"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <style>
      .title { font: 900 74px "Segoe UI", Arial, sans-serif; letter-spacing: 5px; fill: #f8fafc; }
      .subtitle { font: 700 24px "Segoe UI", Arial, sans-serif; letter-spacing: 6px; fill: #cbd5e1; opacity: 0.76; }
      .cardTitle { font: 900 30px "Segoe UI", Arial, sans-serif; fill: #f8fafc; letter-spacing: 1px; }
      .smallCaps { font: 800 15px "Segoe UI", Arial, sans-serif; letter-spacing: 4px; text-transform: uppercase; }
      .body { font: 650 20px "Segoe UI", Arial, sans-serif; fill: #dbeafe; }
      .bodyDim { font: 650 19px "Segoe UI", Arial, sans-serif; fill: #cbd5e1; opacity: 0.9; }
      .done { font: 750 18px "Segoe UI", Arial, sans-serif; fill: #cbd5e1; text-decoration: line-through; opacity: 0.76; }
      .pill { font: 900 15px "Segoe UI", Arial, sans-serif; letter-spacing: 3px; }
    </style>
  </defs>

  <rect width="1720" height="760" rx="34" fill="url(#bg)"/>
  <rect width="1720" height="760" rx="34" fill="url(#battleGlow)"/>
  <rect width="1720" height="760" rx="34" fill="url(#jokerGlow)"/>
  <rect width="1720" height="760" rx="34" fill="url(#wildGlow)"/>
  <rect width="1720" height="760" rx="34" fill="url(#grid)" opacity="0.9"/>

  <path d="M112 238 C 350 132, 553 301, 794 219 S 1310 101, 1612 206" fill="none" stroke="#f5c842" stroke-width="3" stroke-dasharray="12 14" opacity="0.42"/>
  <path d="M122 582 C 360 462, 582 646, 813 548 S 1310 410, 1602 526" fill="none" stroke="#38bdf8" stroke-width="3" stroke-dasharray="12 14" opacity="0.32"/>

  <text x="80" y="94" class="title">CHESS ULTIMATE ROADMAP</text>
  <text x="84" y="136" class="subtitle">MAJOR UPDATES, POLISH PASSES, AND THE CHAOS STILL TO COME</text>
  <rect x="1362" y="26" width="276" height="48" rx="15" fill="#020617" fill-opacity="0.72" stroke="#f5c842" stroke-opacity="0.5"/>
  <text x="1391" y="57" class="pill" fill="#f5c842">LIVE: VERSION 1.4</text>

  <g filter="url(#softShadow)">
    <rect x="70" y="188" width="345" height="472" rx="24" fill="#07121f" fill-opacity="0.88" stroke="#38bdf8" stroke-opacity="0.46" stroke-width="2"/>
    <circle cx="112" cy="230" r="17" fill="#38bdf8" filter="url(#glowBlue)"/>
    <text x="142" y="239" class="smallCaps" fill="#7dd3fc">Completed since v1</text>
    <text x="98" y="298" class="done">Three-edition launcher</text>
    <text x="98" y="336" class="done">Battle, Joker, Wilderness modes</text>
    <text x="98" y="374" class="done">Procedural music + tension</text>
    <text x="98" y="412" class="done">11 variants and 4-player chess</text>
    <text x="98" y="450" class="done">Screenshots + README refresh</text>
    <text x="98" y="488" class="done">Right-click arrows fixed</text>
    <text x="98" y="526" class="done">App icon + window branding</text>
    <text x="98" y="564" class="done">Dynamic launcher version</text>
    <rect x="88" y="598" width="300" height="38" rx="19" fill="#38bdf8" fill-opacity="0.18"/>
    <text x="116" y="623" class="pill" fill="#7dd3fc">FOUNDATION COMPLETE</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="445" y="188" width="345" height="472" rx="24" fill="#171006" fill-opacity="0.9" stroke="#22c55e" stroke-opacity="0.52" stroke-width="2"/>
    <circle cx="487" cy="230" r="17" fill="#22c55e" filter="url(#glowGreen)"/>
    <text x="517" y="239" class="smallCaps" fill="#86efac">Major Update 1</text>
    <text x="473" y="298" class="cardTitle">Terraria Roguelike</text>
    <text x="473" y="342" class="bodyDim">Run-based chess campaigns</text>
    <text x="473" y="378" class="bodyDim">Upgrade trees and relic drops</text>
    <text x="473" y="414" class="bodyDim">Biome boards with hazards</text>
    <text x="473" y="450" class="bodyDim">Boss fights with custom rules</text>
    <text x="473" y="486" class="bodyDim">Loot, curses, shops, and seeds</text>
    <path d="M678 560 l34 -78 l34 78 z" fill="#22c55e" fill-opacity="0.18" stroke="#86efac" stroke-width="3"/>
    <circle cx="712" cy="535" r="10" fill="#86efac"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="820" y="188" width="405" height="472" rx="24" fill="#1b0b0b" fill-opacity="0.9" stroke="#fb7185" stroke-opacity="0.5" stroke-width="2"/>
    <circle cx="862" cy="230" r="17" fill="#fb7185"/>
    <text x="892" y="239" class="smallCaps" fill="#fda4af">Polish Pass</text>
    <text x="848" y="298" class="cardTitle">Bugfixes + Graphics</text>
    <text x="848" y="342" class="bodyDim">Board readability pass</text>
    <text x="848" y="378" class="bodyDim">Cleaner animations and timing</text>
    <text x="848" y="414" class="bodyDim">Sharper card and piece art</text>
    <text x="848" y="450" class="bodyDim">Performance and save cleanup</text>
    <text x="848" y="486" class="bodyDim">Accessibility and settings polish</text>
    <rect x="956" y="548" width="80" height="54" rx="9" fill="#fb7185" fill-opacity="0.12" stroke="#fda4af" stroke-width="3"/>
    <path d="M972 574 h48 M996 550 v50" stroke="#fda4af" stroke-width="5" stroke-linecap="round"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="1250" y="188" width="405" height="472" rx="24" fill="#070914" fill-opacity="0.92" stroke="#f5c842" stroke-opacity="0.55" stroke-width="2"/>
    <circle cx="1292" cy="230" r="17" fill="#f5c842" filter="url(#glowGold)"/>
    <text x="1322" y="239" class="smallCaps" fill="#fde68a">Major Update 2</text>
    <text x="1278" y="298" class="cardTitle">Kerbal Space Program</text>
    <text x="1278" y="342" class="bodyDim">Rocket-part upgrade trees</text>
    <text x="1278" y="378" class="bodyDim">Orbital mission campaign map</text>
    <text x="1278" y="414" class="bodyDim">Gravity-assist modifiers</text>
    <text x="1278" y="450" class="bodyDim">Launch-window boss events</text>
    <text x="1278" y="486" class="bodyDim">Science points for wild builds</text>
    <path d="M1443 548 c22 -54 76 -71 98 -72 c-1 25 -18 78 -72 100 l-22 45 l-19 -19 l-45 22 l22 -45 l-19 -19 z" fill="#f5c842" fill-opacity="0.18" stroke="#fde68a" stroke-width="3"/>
    <circle cx="1497" cy="518" r="10" fill="#fde68a"/>
  </g>

  <g opacity="0.86">
    <circle cx="420" cy="424" r="10" fill="#38bdf8"/>
    <path d="M430 424 H445" stroke="#38bdf8" stroke-width="4" stroke-linecap="round"/>
    <circle cx="795" cy="424" r="10" fill="#22c55e"/>
    <path d="M805 424 H820" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
    <circle cx="1230" cy="424" r="10" fill="#fb7185"/>
    <path d="M1240 424 H1250" stroke="#fb7185" stroke-width="4" stroke-linecap="round"/>
  </g>

  <text x="80" y="714" class="body" opacity="0.82">Roadmap is flexible: ideas may shift as the game gets weirder, cleaner, and more fun.</text>
</svg>
